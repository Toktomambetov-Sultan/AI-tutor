    description: |
      In core/utils.py, update split_into_clauses() (or equivalent) to stop
      treating commas as sentence/clause boundaries.  Only terminal punctuation
      (. ! ?) should trigger a split.
      Update __tests__/test_streaming.py to add/update tests covering the
      new comma-preserving behaviour.
    wave: 1
    agent: gem-implementer
    prototype: false
    covers: ["TTS output quality", "sentence splitting"]
    priority: high
    status: pending
    flags:
      flaky: false
      retries_used: 0
    dependencies: [T06]
    conflicts_with: []
    context_files:

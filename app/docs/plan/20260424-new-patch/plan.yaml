  - id: T04
    title: "Smart interrupt — filler word suppression"
    description: |
      In core/utils.py, add is_filler_utterance(text: str) -> bool that returns
      True for short filler-only utterances (e.g. 'um', 'uh', 'hmm', 'okay',
      'yeah', short single-word acknowledgements ≤ 3 chars).
      In core/conversation.py, call is_filler_utterance() inside
      _on_utterance_detected() AFTER the utterance is complete (post-utterance
      check, NOT at interrupt time).  If the utterance is a filler, suppress
      the agent reply and do not interrupt ongoing TTS playback.
      Update __tests__/test_streaming.py with filler suppression tests.

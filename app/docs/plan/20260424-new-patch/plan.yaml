  # ════════════════════════════════════════════════════════
  # WAVE 2
  # ════════════════════════════════════════════════════════

  - id: T02
    title: "Force-speak on silence + inject silence duration into prompt"
    description: |
      In core/turn_policy.py, extend TimingAwareTurnGate so that when the student
      stays silent longer than force_reply_sec after a held partial utterance,
      the agent is triggered to speak even without new audio.
      In core/prompts.py, inject the current silence duration (seconds) into the
      system prompt so the LLM can acknowledge the pause naturally (e.g.
      "Student has been silent for {N} seconds.").
      Wire both changes into core/conversation.py (_on_utterance_detected and the
      silence timer callback).
      Update __tests__/test_streaming.py with tests for the force-speak path.

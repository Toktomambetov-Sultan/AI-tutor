plan_id: 20260424-new-patch
objective: >
  Implement 11 improvements to the AI tutoring app:
  8 conversational agent backend patches (TTS clause-splitting, inter-sentence
  pauses, latency defaults, voice gender forwarding, force-speak on silence,
  filler word suppression, agent lesson-end signal, Docker build caching) +
  3 frontend UI improvements (multilanguage i18n, material viewer page,
  mobile 480px responsive fixes).
created_at: "2026-04-24"
created_by: gem-planner
status: pending
complexity: medium
research_confidence: high

plan_metrics:
  wave_1_task_count: 5
  total_dependencies: 9
  risk_score: medium

tldr: |
  Five independent wave-1 tasks (T06 scheduled first by user priority, then T01/T03/T05/T07 in
  parallel) patch the conversational agent config, utils, prompts, and Dockerfile.
  Wave 2 runs T02 then T04 sequentially because both write conversation.py.
  Wave 3 runs three independent tasks (T08, UI-T02, UI-T03) in parallel.
  Wave 4 delivers the i18n layer after all UI structural files are stable.
  Docker build + pytest gate enforced after every backend task.
  Frontend npm build gate enforced after every frontend task.


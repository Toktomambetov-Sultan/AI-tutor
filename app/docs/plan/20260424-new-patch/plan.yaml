  # ════════════════════════════════════════════════════════
  # WAVE 1
  # ════════════════════════════════════════════════════════

  - id: T06
    title: "Cache model downloads in Docker build"
    description: |
      Add a dedicated RUN layer in conversational_agent/Dockerfile that downloads
      TTS/STT model weights during the Docker build step (not at container start).
      Use a Python snippet or huggingface_hub/TTS download call so that Docker
      layer caching keeps the weights across code-only rebuilds.
      Add a build ARG (e.g. MODEL_CACHE_BUST) to allow forced re-download when
      model versions change.
    wave: 1
    agent: gem-implementer
    prototype: false
    covers: ["Docker build performance"]
    priority: high
    status: pending
    flags:
      flaky: false
      retries_used: 0
    dependencies: []
    conflicts_with: []
    context_files:
      - path: "conversational_agent/Dockerfile"
        description: "Target file; inspect existing RUN layers and ARG ordering."
      - path: "conversational_agent/requirements.txt"
        description: "Identify TTS/STT packages to determine correct download API."
      - path: "conversational_agent/core/config.py"
        description: "Source of model names/paths used at runtime."
    estimated_effort: small
    estimated_files: 1
    estimated_lines: 30
    focus_area: "conversational_agent/Dockerfile"
    tech_stack: ["Docker", "Python", "huggingface_hub"]
    test_coverage: null
    verification:
      - "docker compose build conversational_agent succeeds"
      - "A second docker compose build conversational_agent (no code change) reuses
         the model layer (layer hash unchanged in build output)"
      - "Container starts and TTS/STT models load without re-downloading"
    acceptance_criteria:
      - "Model weights are downloaded in a dedicated Dockerfile RUN layer"
      - "Code-only rebuilds hit the model layer cache"
      - "MODEL_CACHE_BUST ARG allows forced re-download"
    failure_modes:
      - scenario: "Model download inside Docker fails due to network/firewall"
        likelihood: low
        impact: high
        mitigation: "Add a fallback RUN that skips download if MODEL_SKIP_DOWNLOAD=1 is set,
          so CI environments without internet access can still build."
      - scenario: "Model layer is too large and pushes image over size limit"
        likelihood: low
        impact: medium
        mitigation: "Use --mount=type=cache in BuildKit to keep weights in a build cache
          volume instead of baking them into the image layer."
    contracts_output:
      - "Faster docker compose build for all subsequent tasks (T01–T08, UI-T01–UI-T03)"
    contracts_input: []
    notes: "USER PRIORITY: complete this task first before wave-1 parallel tasks."


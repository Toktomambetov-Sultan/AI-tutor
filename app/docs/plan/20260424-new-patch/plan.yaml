        description: "Contains split_into_clauses or equivalent splitting logic."
      - path: "conversational_agent/__tests__/test_streaming.py"
        description: "Existing streaming tests; update/add clause-split tests here."
    estimated_effort: small
    estimated_files: 2
    estimated_lines: 40
    focus_area: "conversational_agent/core/utils.py"
    tech_stack: ["Python", "pytest"]
    test_coverage: "Test that a sentence with commas is NOT split at the comma.
      Test that . ! ? still split correctly."
    verification:
      - "docker compose build conversational_agent"

          audible delay at sentence start"
        likelihood: low
        impact: medium
        mitigation: "Add a max_chars guard (e.g. 300 chars) to split overly long
          non-punctuated fragments."
    contracts_output:
      - "split_into_clauses(text: str) -> list[str] no longer splits on commas
         (consumed by T04)"
    contracts_input:
      - "T06: Docker build cache speeds up rebuild"
    notes: null

  - id: T03
    title: "Natural inter-sentence pauses (silent WAV blob)"
    description: |
      After each TTS sentence chunk is played, inject a short silent WAV blob
      into the audio queue so the student hears a natural pause between sentences.
      Implement silence generation with numpy.zeros at the TTS sample rate (do NOT
      use time.sleep()).  Expose pause_between_sentences_ms in core/config.py
      (default: 300 ms).  Wire the pause into the _stream_and_speak() pipeline
      in core/conversation.py.
    wave: 1
    agent: gem-implementer
    prototype: false
    covers: ["TTS naturalness", "audio pacing"]
    priority: medium
    status: pending
    flags:
      flaky: false
      retries_used: 0
    dependencies: [T06]
    conflicts_with: []
    context_files:
      - path: "conversational_agent/core/config.py"
        description: "Add pause_between_sentences_ms constant here."
      - path: "conversational_agent/core/conversation.py"
        description: "_stream_and_speak() — inject silence WAV after each chunk."
      - path: "conversational_agent/__tests__/test_streaming.py"
        description: "Add test validating silence WAV is enqueued between sentences."
    estimated_effort: small

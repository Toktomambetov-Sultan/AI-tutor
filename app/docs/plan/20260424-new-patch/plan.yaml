pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "T02 and T04 both mutate conversation.py in wave 2; a merge conflict or
        incorrect ordering could break the silence-injection feature."
      likelihood: medium
      impact: high
      mitigation: >
        Enforce strict sequential execution: T04 must NOT start until T02 is
        merged and its pytest gate passes. Code reviewer should diff conversation.py
        after each task to verify no regressions.
    - scenario: "T08 gRPC signal format change breaks AICall.jsx if T08 backend and
        T08 frontend land out of order."
      likelihood: low
      impact: high
      mitigation: >
        T08-frontend (id: T08) has an explicit dependency on T08-backend (id: T08_backend).
        The [LESSON_END] token contract is defined here; both tasks must reference it.
    - scenario: "react-i18next bundle size regression or missing Kyrgyz strings cause
        UI-T01 to ship broken translations."
      likelihood: medium
      impact: medium
      mitigation: >
        Mark all KG strings as TODO placeholders. EN and RU must be complete before
        the task is closed. npm run build gate will catch missing imports.
    - scenario: "NumPy silence WAV generation at wrong sample rate produces audible
        artifacts or incorrect pause duration."
      likelihood: low
      impact: medium
      mitigation: >
        T03 must read TTS sample rate from config (not hardcode 22050). Add a unit
        test that validates the generated WAV header sample rate matches config.
  assumptions:
    - "conversational_agent Docker image builds with CUDA/CPU toggle via ARG — model
       caching in T06 uses the same ARG."
    - "Frontend is React + Vite; react-i18next is not yet installed."
    - "AICall.jsx Web Audio pipeline (see frontend-audio-smoothing.md) is stable and
       should NOT be refactored by UI-T03."
    - "Kaldi recognizer and SharedResources DI patterns from the last refactor are in
       place (see conversational_agent_refactor.md)."

implementation_specification:
  code_structure: >
    Backend patches are isolated to the conversational_agent service.
    Each task targets at most 3 files. Shared entry points: core/config.py
    (T03/T05/T07) and core/conversation.py (T02/T03/T04/T05/T07/T08).
    Frontend patches are isolated to the frontend service.
    New i18n folder lives at frontend/src/i18n/ with one JSON per locale.
  affected_areas:
    - conversational_agent/Dockerfile
    - conversational_agent/core/config.py
    - conversational_agent/core/conversation.py
    - conversational_agent/core/utils.py
    - conversational_agent/core/prompts.py
    - conversational_agent/core/turn_policy.py
    - conversational_agent/core/grpc_servicer.py
    - conversational_agent/__tests__/test_streaming.py
    - frontend/src/pages/student/AICall.jsx
    - frontend/src/pages/student/AICall.css
    - frontend/src/pages/student/LessonViewer.jsx
    - frontend/src/pages/student/Student.css
    - frontend/src/App.jsx
    - frontend/src/i18n/ (new)
    - frontend/src/pages/student/MaterialViewer.jsx (new)
  component_details:
    - component: "Dockerfile (conversational_agent)"
      responsibility: "Cache HuggingFace / TTS model weights in a dedicated RUN layer
        so they survive rebuilds when only code changes."
      interfaces: ["ARG CACHE_BUST", "RUN pip install + model download"]
      dependencies: []
      integration_points: ["All conversational_agent tasks benefit from faster builds"]
    - component: "core/utils.py"
      responsibility: "Sentence splitting (remove comma as clause delimiter) and
        utterance filler detection."
      interfaces: ["split_into_clauses(text) -> list[str]",
                   "is_filler_utterance(text) -> bool"]
      dependencies: []
      integration_points: ["core/conversation.py"]
    - component: "core/config.py"
      responsibility: "Single source of truth for all tuneable constants including
        pause_between_sentences_ms, force_reply_sec, latency knobs, voice gender."
      interfaces: ["RUNTIME_CONFIG.tts", "RUNTIME_CONFIG.turn_policy",
                   "AGENT_VOICE_GENDER env var"]
      dependencies: []
      integration_points: ["core/conversation.py", "core/prompts.py",
                           "core/turn_policy.py"]
    - component: "core/conversation.py"
      responsibility: "Orchestrates pipeline: injects silence WAV, reads gender,
        fires force-speak, suppresses filler interrupts, emits [LESSON_END]."
      interfaces: ["ConversationalAgent._stream_and_speak()",
                   "_on_utterance_detected()", "_check_lesson_end()"]
      dependencies: ["core/config.py", "core/utils.py", "core/prompts.py",
                     "core/turn_policy.py"]
      integration_points: ["core/grpc_servicer.py"]
    - component: "core/prompts.py"
      responsibility: "System prompt assembly: voice gender ephemeral message,
        silence duration injection, [LESSON_END] token instruction."
      interfaces: ["build_system_message(gender, silence_ms) -> str",
                   "LESSON_END_TOKEN constant"]
      dependencies: ["core/config.py"]
      integration_points: ["core/conversation.py"]
    - component: "core/turn_policy.py"
      responsibility: "Force-speak timer: fires on_utterance callback after
        silence threshold even with no new audio."
      interfaces: ["TimingAwareTurnGate.force_speak_if_silent()"]
      dependencies: ["core/config.py"]
      integration_points: ["core/conversation.py"]
    - component: "core/grpc_servicer.py"
      responsibility: "Translates [LESSON_END] token in streamed LLM output into
        a typed QueueMessage that the frontend can interpret."
      interfaces: ["MessageType.LESSON_END", "QueueMessage(type=LESSON_END)"]
      dependencies: ["core/protocol.py", "core/conversation.py"]
      integration_points: ["frontend AICall.jsx via gRPC stream"]
    - component: "frontend/src/pages/student/AICall.jsx"
      responsibility: "Handle LESSON_END gRPC message type: end the call and
        navigate student back to course overview."
      interfaces: ["onLessonEnd() callback", "MessageType.LESSON_END handling"]
      dependencies: ["core/grpc_servicer.py contract"]
      integration_points: ["frontend routing"]
    - component: "frontend/src/pages/student/MaterialViewer.jsx (new)"
      responsibility: "Bare page (no Layout) that renders a single course material
        at /courses/:id/lessons/:lessonId/material/:materialId."
      interfaces: ["route param: materialId", "fetch material from backend API"]
      dependencies: ["frontend/src/App.jsx route registration"]
      integration_points: ["LessonViewer.jsx links"]
    - component: "frontend/src/i18n/ (new)"
      responsibility: "react-i18next setup + EN/RU locale JSON files; KG strings
        marked as TODO."
      interfaces: ["i18n.js initializer", "en.json", "ru.json", "kg.json"]
      dependencies: ["react-i18next package"]
      integration_points: ["All frontend pages via useTranslation hook"]


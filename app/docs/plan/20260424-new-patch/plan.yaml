  - id: T07
    title: "Pass voice actor gender to LLM"
    description: |
      Read AGENT_VOICE_GENDER environment variable in core/config.py
      (values: 'male' | 'female', default: 'female').
      In core/prompts.py, add a helper that builds an ephemeral per-turn system

    contracts_output: []
    contracts_input:
      - "T06: Docker build cache"
    notes: "Architecture decision: silence via numpy zeros WAV, NOT time.sleep()."

  - id: T05
    title: "Reduce latency defaults"
    description: |
      Audit RUNTIME_CONFIG in core/config.py and lower default values for:
      - STT partial-result flush delay
      - LLM first-token timeout
      - TTS pre-buffer size
      - Any other latency-contributing knobs
